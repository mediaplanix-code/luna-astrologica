<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Luna Astrologica</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.47.10/dist/umd/supabase.min.js"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="app-wrapper">
        <div class="app-container">
            <!-- HEADER -->
            <header class="header" id="app-header"></header>

            <!-- BOTTOM NAV -->
            <nav class="bottom-nav" id="app-nav"></nav>

            <!-- PAGES -->
            <div class="page-section active" id="page-home"></div>
            <div class="page-section" id="page-horoscope"></div>
            
            <!-- PAGINA PERSONALIZZATA: aggiunto container Luna Context -->
            <div class="page-section" id="page-personalized">
                <div id="luna-context"></div>
            </div>
            
            <div class="page-section" id="page-chat"></div>

            <!-- MODALS -->
            <div class="modal-overlay" id="authModal" onclick="if(event.target===this)window.app.closeAuthModal()"></div>
            <div class="modal-overlay" id="compatModal" onclick="if(event.target===this)window.app.closeCompatModal()"></div>
        </div>
    </div>

    <!-- LUNA CONTEXT — caricato prima dei moduli, funzioni globali -->
    <script src="js/luna-context.js"></script>

    <!-- MODULI JS — ORDINE IMPORTANTE -->
    <script type="module" src="js/config.js"></script>
    <script type="module" src="js/utils.js"></script>
    <script type="module" src="js/ui.js"></script>
    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/horoscope.js"></script>
    <script type="module" src="js/natal.js"></script>
    <script type="module" src="js/chat.js"></script>
    <script type="module" src="js/transits.js"></script>
    <script type="module" src="js/app.js"></script>

    <!-- AUTO-INIT: quando il DOM è pronto e c'è un utente loggato, attiva Luna -->
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        // Attendi che Supabase (globale dal CDN) sia pronto
        let attempts = 0;
        const maxAttempts = 30;
        
        const tryInitLuna = async function() {
            // Cerca il client Supabase globale (dal CDN UMD)
            const sb = window.supabase || window.supabaseClient || window._supabase;
            
            if (sb && sb.auth && typeof initLunaContext === 'function') {
                try {
                    const { data, error } = await sb.auth.getUser();
                    if (data && data.user) {
                        console.log('[Luna AutoInit] Utente trovato, avvio dashboard...');
                        initLunaContext(data.user.id);
                        return true;
                    }
                } catch (e) {
                    console.log('[Luna AutoInit] Auth non pronto:', e.message);
                }
            }
            return false;
        };
        
        // Prova subito, altrimenti polling ogni 600ms
        if (!tryInitLuna()) {
            const interval = setInterval(async function() {
                attempts++;
                const ok = await tryInitLuna();
                if (ok || attempts >= maxAttempts) {
                    clearInterval(interval);
                    if (!ok) console.log('[Luna AutoInit] Timeout: nessun utente loggato trovato.');
                }
            }, 600);
        }
    });
    </script>
</body>
</html>
